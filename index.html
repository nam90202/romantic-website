<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Anh Yêu Em" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Một trải nghiệm Three.js lãng mạn" />
  <title>Anh yêu em ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Segoe UI', Roboto, sans-serif;
      background: #000;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .ui-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      animation: fadeInOut 6s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.8; }
    }

    .heart-icon {
      display: inline-block;
      margin-left: 8px;
      animation: heartBeat 1.5s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      text-align: center;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="ui-container">
    Anh yêu em <span class="heart-icon">❤️</span>
  </div>
  <div class="info">
    Vuốt để xoay • Chép để phóng to
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
